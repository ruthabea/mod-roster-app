name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject secrets into config.js
        run: |
          cp config.template.js config.js
          
          echo "Checking secrets..."
          echo "SUPABASE_URL length: ${#SUPABASE_URL}"
          echo "SUPABASE_ANON_KEY length: ${#SUPABASE_ANON_KEY}"
          echo "TEAMS_WEBHOOK_URL length: ${#TEAMS_WEBHOOK_URL}"
          
          sed -i "s|__SUPABASE_URL__|${SUPABASE_URL}|g" config.js
          sed -i "s|__SUPABASE_ANON_KEY__|${SUPABASE_ANON_KEY}|g" config.js
          sed -i "s|__TEAMS_WEBHOOK_URL__|${TEAMS_WEBHOOK_URL}|g" config.js
          
          echo "Config.js generated successfully"
          
          FAILED=0
          if grep -q "__SUPABASE_URL__" config.js; then
            echo "ERROR: SUPABASE_URL secret is missing"
            FAILED=1
          fi
          if grep -q "__SUPABASE_ANON_KEY__" config.js; then
            echo "ERROR: SUPABASE_ANON_KEY secret is missing"
            FAILED=1
          fi
          if grep -q "__TEAMS_WEBHOOK_URL__" config.js; then
            echo "ERROR: TEAMS_WEBHOOK_URL secret is missing"
            FAILED=1
          fi
          
          if [ $FAILED -eq 1 ]; then
            exit 1
          fi
          echo "All placeholders replaced successfully!"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
