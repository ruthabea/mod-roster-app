name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject secrets into config.js
        run: |
          # Copy template to config.js
          cp config.template.js config.js
          
          # Replace placeholders with actual secrets
          sed -i "s|__SUPABASE_URL__|${{ secrets.SUPABASE_URL }}|g" config.js
          sed -i "s|__SUPABASE_ANON_KEY__|${{ secrets.SUPABASE_ANON_KEY }}|g" config.js
          sed -i "s|__TEAMS_WEBHOOK_URL__|${{ secrets.TEAMS_WEBHOOK_URL }}|g" config.js
          
          # Verify replacements (without exposing secrets)
          echo "Config.js generated successfully"
          echo "Checking for remaining placeholders..."
          if grep -q "__SUPABASE_URL__\|__SUPABASE_ANON_KEY__\|__TEAMS_WEBHOOK_URL__" config.js; then
            echo "WARNING: Some placeholders were not replaced. Check your GitHub Secrets."
            exit 1
          fi
          echo "All placeholders replaced successfully!"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
